version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: cyber_ai_db

    ports:
      - "3306:3306"

  redis:
    image: redis:latest

    ports:
      - "6379:6379"